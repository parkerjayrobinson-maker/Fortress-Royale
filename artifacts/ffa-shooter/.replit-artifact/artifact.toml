kind = "web"
previewPath = "/"
title = "FFA Shooter"
version = "1.0.0"
id = "artifacts/ffa-shooter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26079

[services.development]
run = "pnpm --filter @workspace/ffa-shooter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ffa-shooter", "run", "build" ]
publicDir = "artifacts/ffa-shooter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26079"
BASE_PATH = "/"
